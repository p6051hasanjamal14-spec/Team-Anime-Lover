<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Team Anime Lover</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow: hidden; }
    .auth-bg { position:fixed; inset:0; background:url('assets/background.png') center/cover no-repeat; filter:brightness(0.28) saturate(1.3); }
    .auth-bg::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at center,rgba(232,180,90,0.07) 0%,rgba(10,10,15,0.65) 100%); }
    .auth-wrap { position:relative; z-index:1; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .auth-box { background:rgba(17,17,24,0.95); border:1px solid rgba(232,180,90,0.22); border-radius:20px; width:100%; max-width:440px; backdrop-filter:blur(24px); box-shadow:0 32px 80px rgba(0,0,0,0.8); overflow:hidden; }
    .auth-logo { text-align:center; padding:32px 32px 0; }
    .auth-logo img { width:82px; height:82px; object-fit:cover; border-radius:16px; border:3px solid var(--accent); margin:0 auto 12px; display:block; }
    .auth-logo h1 { font-family:var(--font-heading); font-size:2rem; letter-spacing:2px; }
    .auth-logo h1 span { color:var(--accent); }
    .auth-logo p { color:var(--text-muted); font-size:0.85rem; margin-top:4px; }
    .auth-tabs { display:flex; margin:24px 32px 0; background:rgba(255,255,255,0.05); border-radius:12px; padding:4px; }
    .auth-tab { flex:1; padding:10px; text-align:center; border-radius:9px; font-family:var(--font-ui); font-weight:700; font-size:0.95rem; cursor:pointer; color:var(--text-muted); background:none; border:none; transition:all 0.2s; }
    .auth-tab.active { background:var(--accent); color:var(--bg-dark); }
    .auth-form { padding:24px 32px 32px; }
    .auth-panel { display:none; }
    .auth-panel.active { display:block; }
    .error-msg { background:rgba(255,77,109,0.12); border:1px solid rgba(255,77,109,0.3); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.85rem; color:var(--accent2); display:none; }
    .success-msg { background:rgba(40,200,100,0.12); border:1px solid rgba(40,200,100,0.3); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.85rem; color:#28c864; display:none; }
    .auth-form .btn { width:100%; justify-content:center; padding:14px; font-size:1rem; margin-bottom:10px; }
    .terms { font-size:0.78rem; color:var(--text-muted); text-align:center; margin-top:8px; line-height:1.5; }
    .show-pass { position:relative; }
    .toggle-eye { position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1rem; color:var(--text-muted); user-select:none; }
    .show-pass input { padding-right:40px; width:100%; }

    /* Divider */
    .or-divider { display:flex; align-items:center; gap:12px; margin:16px 0; }
    .or-divider::before,.or-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .or-divider span { font-size:0.8rem; color:var(--text-muted); font-weight:600; }

    /* Google Button */
    .btn-google {
      width:100%; display:flex; align-items:center; justify-content:center; gap:12px;
      padding:13px; border-radius:10px; background:#fff; color:#1a1a1a;
      font-family:var(--font-ui); font-weight:700; font-size:0.95rem;
      border:none; cursor:pointer; transition:all 0.2s; margin-bottom:0;
    }
    .btn-google:hover { background:#f0f0f0; transform:translateY(-1px); box-shadow:0 4px 16px rgba(255,255,255,0.2); }
    .btn-google:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .google-icon { width:20px; height:20px; }

    /* Loading overlay shown while checking auth state */
    #authLoader {
      position:fixed; inset:0; background:var(--bg-dark); z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    }
    #authLoader img { width:70px; border-radius:14px; border:3px solid var(--accent); }
    #authLoader p { font-family:var(--font-ui); color:var(--text-muted); font-size:0.9rem; }
  </style>
</head>
<body>

  <!-- Loading screen while checking if user is already logged in -->
  <div id="authLoader">
    <img src="assets/logo.jpeg" alt="Logo">
    <div class="spinner"></div>
    <p>Checking session...</p>
  </div>

  <div class="auth-bg"></div>
  <div class="auth-wrap" id="authWrap" style="display:none;">
    <div class="auth-box">
      <div class="auth-logo">
        <img src="assets/logo.jpeg" alt="Team Anime Lover">
        <h1>Team Anime <span>Lover</span></h1>
        <p>Your anime universe awaits ✨</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin"  onclick="switchAuth('login')">Sign In</button>
        <button class="auth-tab"        id="tabSignup" onclick="switchAuth('signup')">Sign Up</button>
      </div>

      <div class="auth-form">

        <!-- ── LOGIN ── -->
        <div class="auth-panel active" id="loginPanel">
          <div class="error-msg"   id="loginError"></div>
          <div class="success-msg" id="loginSuccess"></div>

          <!-- Google -->
          <button class="btn-google" id="googleLoginBtn" onclick="doGoogleLogin()">
            <svg class="google-icon" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
          </button>

          <div class="or-divider"><span>OR</span></div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="show-pass">
              <input type="password" class="form-input" id="loginPassword" placeholder="••••••••">
              <span class="toggle-eye" onclick="toggleEye('loginPassword',this)">👁</span>
            </div>
          </div>
          <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
          <div class="terms">By signing in you agree to our Terms of Service.</div>
        </div>

        <!-- ── SIGN UP ── -->
        <div class="auth-panel" id="signupPanel">
          <div class="error-msg"   id="signupError"></div>
          <div class="success-msg" id="signupSuccess"></div>

          <!-- Google -->
          <button class="btn-google" id="googleSignupBtn" onclick="doGoogleLogin()">
            <svg class="google-icon" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign up with Google
          </button>

          <div class="or-divider"><span>OR</span></div>

          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="signupName" placeholder="Naruto Uzumaki">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="signupEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="show-pass">
              <input type="password" class="form-input" id="signupPassword" placeholder="Min. 6 characters">
              <span class="toggle-eye" onclick="toggleEye('signupPassword',this)">👁</span>
            </div>
          </div>
          <button class="btn btn-primary" id="signupBtn" onclick="doSignup()">Create Account</button>
          <div class="terms">By signing up you agree to our Terms of Service.</div>
        </div>

      </div>
    </div>
  </div>

  <script type="module" src="js/db.js"></script>
  <script src="js/cloudinary.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // db-ready fires after onAuthStateChanged resolves
    window.addEventListener("db-ready", () => {
      const s = DB.getSession();
      if (s) {
        // Already logged in → redirect
        window.location.href = s.isAdmin ? "admin.html" : "index.html";
        return;
      }
      // Not logged in → show auth form
      document.getElementById("authLoader").style.display = "none";
      document.getElementById("authWrap").style.display   = "flex";
    });

    function switchAuth(tab) {
      document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".auth-panel").forEach(p => p.classList.remove("active"));
      document.getElementById(tab === "login" ? "tabLogin" : "tabSignup").classList.add("active");
      document.getElementById(tab + "Panel").classList.add("active");
    }

    function toggleEye(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === "password" ? "text" : "password";
      btn.textContent = inp.type === "password" ? "👁" : "🙈";
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent    = msg;
      el.style.display  = "block";
    }
    function hideMsg(errId, sucId) {
      document.getElementById(errId).style.display = "none";
      if (sucId) document.getElementById(sucId).style.display = "none";
    }

    // ── Google Sign-In ──
    async function doGoogleLogin() {
      const btns = document.querySelectorAll(".btn-google");
      btns.forEach(b => { b.disabled = true; b.textContent = "Signing in..."; });
      try {
        const res = await DB.loginWithGoogle();
        if (!res.ok) { showErr("loginError", res.msg); return; }
        window.location.href = "index.html";
      } catch (e) {
        showErr("loginError", "Google sign-in failed. Try again.");
      } finally {
        btns.forEach(b => { b.disabled = false; });
        document.querySelectorAll(".btn-google").forEach(b => {
          b.innerHTML = `<svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg> Continue with Google`;
        });
      }
    }

    // ── Email Login ──
    async function doLogin() {
      hideMsg("loginError", "loginSuccess");
      const email = document.getElementById("loginEmail").value.trim();
      const pass  = document.getElementById("loginPassword").value;
      const btn   = document.getElementById("loginBtn");
      if (!email || !pass) { showErr("loginError", "Please fill in all fields."); return; }
      btn.disabled = true; btn.textContent = "Signing in...";
      try {
        const res = await DB.loginUser(email, pass);
        if (!res.ok) { showErr("loginError", res.msg); return; }
        window.location.href = res.isAdmin ? "admin.html" : "index.html";
      } catch (e) {
        showErr("loginError", "Connection error. Please check your internet.");
      } finally {
        btn.disabled = false; btn.textContent = "Sign In";
      }
    }

    // ── Email Sign Up ──
    async function doSignup() {
      hideMsg("signupError", "signupSuccess");
      const name  = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const pass  = document.getElementById("signupPassword").value;
      const btn   = document.getElementById("signupBtn");
      if (!name || !email || !pass) { showErr("signupError", "Please fill in all fields."); return; }
      if (pass.length < 6) { showErr("signupError", "Password must be at least 6 characters."); return; }
      btn.disabled = true; btn.textContent = "Creating account...";
      try {
        const res = await DB.registerUser({ name, email, password: pass });
        if (!res.ok) { showErr("signupError", res.msg); return; }
        // Redirect immediately — Firebase Auth handles persistence
        window.location.href = "index.html";
      } catch (e) {
        showErr("signupError", "Connection error. Please check your internet.");
      } finally {
        btn.disabled = false; btn.textContent = "Create Account";
      }
    }

    // Enter key support
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      document.getElementById("loginPanel").classList.contains("active") ? doLogin() : doSignup();
    });
  </script>
</body>
</html>
